name: Update HTAN2 ClickHouse DB

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: 'Path to the CSV file to import (relative to repo root)'
        required: true
        type: string
        default: 'data/phase2/example_gold.csv'
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      head_ref:
        required: true
        type: string
      csv_path:
        description: 'Path to the CSV file to import (relative to repo root)'
        required: true
        type: string
      can_push:
        required: false
        type: string
        default: 'false'

concurrency:
  group: update-htan2-db-${{ inputs.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-htan2-clickhouse-db:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build packages
        run: yarn buildPackages

      - name: Generate DB name
        id: db-name
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"
          if [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "db_name=htan2_${PR_NUMBER}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(date -u +'%Y_%m%d_%H%M')
            echo "db_name=htan2_${TIMESTAMP}" >> $GITHUB_OUTPUT
          fi

      - name: Import CSV into ClickHouse DB
        env:
          CLICKHOUSE_DB: ${{ steps.db-name.outputs.db_name }}
          CLICKHOUSE_HOST: ${{ vars.CLICKHOUSE_HOST }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          export CLICKHOUSE_URL="${CLICKHOUSE_HOST}/${CLICKHOUSE_DB}"
          node build_db/import_csv.js "${{ inputs.csv_path }}"

      - name: Update DEFAULT_CLICKHOUSE_DB_HTAN2 in clickhouseHelpers.ts
        run: |
          sed -i "s/export const DEFAULT_CLICKHOUSE_DB_HTAN2 = '[^']*'/export const DEFAULT_CLICKHOUSE_DB_HTAN2 = '${{ steps.db-name.outputs.db_name }}'/" \
            packages/data-portal-commons/src/lib/clickhouseHelpers.ts
          grep -q "DEFAULT_CLICKHOUSE_DB_HTAN2 = '${{ steps.db-name.outputs.db_name }}'" \
            packages/data-portal-commons/src/lib/clickhouseHelpers.ts || \
            (echo "ERROR: failed to update DEFAULT_CLICKHOUSE_DB_HTAN2 in clickhouseHelpers.ts" && exit 1)

      - name: Check whether PR branch is in this repository
        id: branch-permissions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ inputs.can_push }}" = "true" ] || \
             [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push DEFAULT_CLICKHOUSE_DB_HTAN2 update
        id: commit-clickhouse
        if: steps.branch-permissions.outputs.can_push == 'true'
        run: |
          if git diff --quiet packages/data-portal-commons/src/lib/clickhouseHelpers.ts; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add packages/data-portal-commons/src/lib/clickhouseHelpers.ts
            git commit -m "chore: update DEFAULT_CLICKHOUSE_DB_HTAN2 to ${{ steps.db-name.outputs.db_name }}"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: github.event_name == 'workflow_call' && steps.commit-clickhouse.outputs.committed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const dbName = '${{ steps.db-name.outputs.db_name }}';
            const body = `✅ HTAN2 ClickHouse database \`${dbName}\` has been created and populated from \`${{ inputs.csv_path }}\`. \`DEFAULT_CLICKHOUSE_DB_HTAN2\` has been updated in \`clickhouseHelpers.ts\` and committed to this PR. The Phase 2 data is now available at \`/explore2\`.`;
            github.rest.issues.createComment({
              issue_number: ${{ inputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
