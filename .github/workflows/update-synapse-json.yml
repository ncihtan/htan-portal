name: Update and Gzip Synapse JSON

on:
  pull_request:
    paths:
      - 'data/publications_manifest_all.json'
      - 'packages/data-portal-commons/src/assets/crdcgc_drs_mapping.json'
      - 'public/syn_data.json.gz'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-synapse-json:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    outputs:
      can_push: ${{ steps.branch-permissions.outputs.can_push }}
      changed: ${{ steps.verify-changed-files.outputs.changed }}
      syn_data_changed: ${{ steps.changed-files.outputs.syn_data_changed }}
      commit_message: ${{ steps.commit-message.outputs.commit_message }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Detect changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          if echo "$CHANGED_FILES" | grep -q "^public/syn_data\.json\.gz$"; then
            echo "syn_data_changed=true" >> $GITHUB_OUTPUT
          else
            echo "syn_data_changed=false" >> $GITHUB_OUTPUT
          fi
          echo "$CHANGED_FILES" > /tmp/changed_files.txt

      - name: Compute commit message
        id: commit-message
        run: |
          if [ "${{ steps.changed-files.outputs.syn_data_changed }}" = "true" ]; then
            echo "commit_message=chore: update processed synapse JSON after syn_data.json.gz update" >> $GITHUB_OUTPUT
          else
            CHANGED_PARTS=()
            if grep -q "^data/publications_manifest_all\.json$" /tmp/changed_files.txt; then
              CHANGED_PARTS+=("publications_manifest_all.json")
            fi
            if grep -q "^packages/data-portal-commons/src/assets/crdcgc_drs_mapping\.json$" /tmp/changed_files.txt; then
              CHANGED_PARTS+=("crdcgc_drs_mapping.json")
            fi

            if [ ${#CHANGED_PARTS[@]} -eq 0 ]; then
              echo "commit_message=chore: update synapse JSON files" >> $GITHUB_OUTPUT
            elif [ ${#CHANGED_PARTS[@]} -eq 1 ]; then
              echo "commit_message=chore: update synapse JSON files after ${CHANGED_PARTS[0]} update" >> $GITHUB_OUTPUT
            else
              echo "commit_message=chore: update synapse JSON files after ${CHANGED_PARTS[0]} and ${CHANGED_PARTS[1]} updates" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create gsed symlink (ubuntu-latest ships GNU sed as sed, not gsed)
        if: steps.changed-files.outputs.syn_data_changed == 'true'
        run: sudo ln -sf /usr/bin/sed /usr/local/bin/gsed

      - name: Run update script
        run: |
          if [ "${{ steps.changed-files.outputs.syn_data_changed }}" = "true" ]; then
            yarn run updateData
          else
            yarn run updateAndGzipSynapseJSON
          fi

      - name: Check whether PR branch is in this repository
        id: branch-permissions
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR if no changes
        if: steps.verify-changed-files.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- synapse-json-no-changes -->';
            const body = `${marker}
            ✅ Synapse JSON update completed with no file changes.`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Comment on PR for forked PRs with changes
        if: steps.verify-changed-files.outputs.changed == 'true' && steps.branch-permissions.outputs.can_push == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- synapse-json-forked-with-changes -->';
            const body = `${marker}
            ⚠️ Synapse JSON update generated file changes, but this PR comes from a fork so the workflow cannot push commits to the source branch.`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
  commit-synapse-json:
    needs: analyze-synapse-json
    if: needs.analyze-synapse-json.outputs.changed == 'true' && needs.analyze-synapse-json.outputs.can_push == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      committed: ${{ steps.commit-synapse.outputs.committed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create gsed symlink (ubuntu-latest ships GNU sed as sed, not gsed)
        if: needs.analyze-synapse-json.outputs.syn_data_changed == 'true'
        run: sudo ln -sf /usr/bin/sed /usr/local/bin/gsed

      - name: Run update script
        run: |
          if [ "${{ needs.analyze-synapse-json.outputs.syn_data_changed }}" = "true" ]; then
            yarn run updateData
          else
            yarn run updateAndGzipSynapseJSON
          fi

      - name: Commit and push changes
        id: commit-synapse
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Stage all tracked modified files: updateData can touch syn_data.json.gz,
          # processed_syn_data.json.gz, htan-imaging-assets.json, syn_metadata.json, etc.
          git add -u
          git commit -m "${{ needs.analyze-synapse-json.outputs.commit_message }}"
          git push
          echo "committed=true" >> $GITHUB_OUTPUT

      - name: Comment on PR with changes
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Synapse JSON files have been updated and committed to this PR.'
            })

  update-clickhouse-db:
    needs: [analyze-synapse-json, commit-synapse-json]
    if: needs.commit-synapse-json.result == 'success' && needs.commit-synapse-json.outputs.committed == 'true'
    uses: ./.github/workflows/update-clickhouse-db.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      head_ref: ${{ github.head_ref }}
      can_push: ${{ needs.analyze-synapse-json.outputs.can_push }}
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
