name: Update and Gzip Synapse JSON

on:
  pull_request:
    paths:
      - 'data/publications_manifest_all.json'

jobs:
  update-synapse-json:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run updateAndGzipSynapseJSON
        run: yarn run updateAndGzipSynapseJSON

      - name: Check whether PR branch is in this repository
        id: branch-permissions
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            echo "can_push=true" >> $GITHUB_OUTPUT
          else
            echo "can_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true' && steps.branch-permissions.outputs.can_push == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/processed_syn_data.json.gz pages/publications/static_page_ids.json
          git commit -m "chore: update synapse JSON files after publications manifest update"
          git push

      - name: Comment on PR if no changes
        if: steps.verify-changed-files.outputs.changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Synapse JSON update completed with no file changes.'
            })

      - name: Comment on PR with changes
        if: steps.verify-changed-files.outputs.changed == 'true' && steps.branch-permissions.outputs.can_push == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Synapse JSON files have been updated and committed to this PR.'
            })

      - name: Comment on PR for forked PRs with changes
        if: steps.verify-changed-files.outputs.changed == 'true' && steps.branch-permissions.outputs.can_push == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Synapse JSON update generated file changes, but this PR comes from a fork so the workflow cannot push commits to the source branch.'
            })
